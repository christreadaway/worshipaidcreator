[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Fonts MUST ship with the function: PDF export embeds Liberation Sans
  # (system fonts don't exist on Lambda). pdfkit's .afm metric files are
  # included as a safety net for any built-in-font fallback path.
  included_files = ["sample/**", "src/assets/fonts/**", "node_modules/pdfkit/js/data/*.afm"]

# Redirect all API calls to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
